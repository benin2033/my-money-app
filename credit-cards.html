<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>信用卡管理</title>
  <style>
    :root {
      --bg: #f7efe2;
      --card: #fffaf4;
      --line: #e5d7c8;
      --text: #46362d;
      --subtle: #7a6357;
      --accent: #b57542;
      --accent-deep: #975d33;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", sans-serif;
      color: var(--text);
      background: var(--bg);
      padding: 16px;
    }
    .wrap {
      width: 100%;
      max-width: 820px;
      margin: 0 auto;
      display: grid;
      gap: 12px;
    }
    .card {
      border: 1px solid var(--line);
      border-radius: 14px;
      background: var(--card);
      padding: 14px;
      display: grid;
      gap: 10px;
    }
    h1 { margin: 0; font-size: 1.15rem; }
    p { margin: 0; color: var(--subtle); font-size: 0.9rem; }
    .grid {
      display: grid;
      gap: 8px;
      grid-template-columns: 1.2fr 1fr auto;
    }
    input, select, button, a {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px 12px;
      min-height: 44px;
      font-size: 0.92rem;
      color: var(--text);
      background: #fff9f2;
      text-decoration: none;
    }
    button { cursor: pointer; }
    .btn-primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff8f0;
    }
    .btn-primary:hover {
      background: var(--accent-deep);
      border-color: var(--accent-deep);
    }
    .list { display: grid; gap: 8px; }
    .row {
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fffdf9;
      padding: 10px;
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }
    .meta { color: var(--subtle); font-size: 0.82rem; }
    .head { display: flex; justify-content: space-between; gap: 8px; align-items: center; flex-wrap: wrap; }
    .row-actions { display: inline-flex; gap: 6px; }
    .tiny-btn { font-size: 0.8rem; padding: 6px 8px; }
    .row-edit-form {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }
    .row-edit-form input { padding: 6px 10px; font-size: 0.9rem; }
    .robot-btn {
      position: fixed;
      right: 18px;
      bottom: 18px;
      width: 62px;
      height: 62px;
      border-radius: 50%;
      border: 1px solid #e3c2a3;
      background: linear-gradient(145deg, #f6dec1, #f0c899);
      box-shadow: 0 8px 18px rgba(129, 81, 46, 0.25);
      font-size: 1.5rem;
      z-index: 30;
    }
    .robot-panel {
      position: fixed;
      right: 18px;
      bottom: 92px;
      width: min(360px, calc(100vw - 24px));
      border: 1px solid var(--line);
      border-radius: 16px;
      background: #fff8ef;
      box-shadow: 0 10px 24px rgba(92, 57, 34, 0.12);
      padding: 12px;
      z-index: 30;
      display: none;
    }
    .robot-panel.show { display: block; }
    .tool-title { margin: 0 0 8px; color: #6f4d3a; font-size: 0.93rem; font-weight: 700; }
    .tool-list { margin: 0 0 10px; padding-left: 18px; color: var(--subtle); font-size: 0.86rem; line-height: 1.55; }
    .calc { border: 1px solid var(--line); border-radius: 12px; padding: 10px; background: #fbf1e3; }
    .calc-screen { width: 100%; margin-bottom: 8px; text-align: right; font-weight: 700; font-size: 1rem; background: #fff8f0; }
    .calc-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
    .calc-grid button { padding: 9px 0; font-weight: 700; }
    @media (max-width: 520px) {
      body { padding: 10px; }
      .grid { grid-template-columns: 1fr; }
      .robot-btn { width: 54px; height: 54px; right: 12px; bottom: 12px; }
      .robot-panel { right: 12px; bottom: 76px; }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="card">
      <div class="head">
        <h1>信用卡管理</h1>
        <a href="./index.html">返回記帳首頁</a>
      </div>
      <p>設定信用卡名稱與繳款日（每月幾號）。記帳時可選擇使用哪張卡消費。</p>
    </section>

    <section class="card">
      <div class="grid">
        <input id="cardName" type="text" placeholder="信用卡名稱（如：主卡）" />
        <input id="dueDay" type="number" min="1" max="28" placeholder="繳款日（1-28）" value="15" />
        <button id="addBtn" type="button" class="btn-primary">新增</button>
      </div>
      <div id="cardList" class="list"></div>
    </section>
  </main>

  <button id="robotBtn" class="robot-btn" title="開啟小幫手">🤖</button>
  <aside id="robotPanel" class="robot-panel" aria-hidden="true">
    <p class="tool-title">小幫手工具箱</p>
    <ol class="tool-list">
      <li>計算機，直接在頁面旁協助你做簡單計算</li>
    </ol>
    <section id="toolCalculator" class="tool-body" style="display:block;">
      <div class="calc">
        <input id="calcScreen" class="calc-screen" type="text" value="0" readonly />
        <div class="calc-grid" id="calcGrid">
          <button type="button" data-action="clear">C</button>
          <button type="button" data-action="delete">DEL</button>
          <button type="button" data-value="%">%</button>
          <button type="button" data-value="/">/</button>
          <button type="button" data-value="7">7</button>
          <button type="button" data-value="8">8</button>
          <button type="button" data-value="9">9</button>
          <button type="button" data-value="*">*</button>
          <button type="button" data-value="4">4</button>
          <button type="button" data-value="5">5</button>
          <button type="button" data-value="6">6</button>
          <button type="button" data-value="-">-</button>
          <button type="button" data-value="1">1</button>
          <button type="button" data-value="2">2</button>
          <button type="button" data-value="3">3</button>
          <button type="button" data-value="+">+</button>
          <button type="button" data-value="0">0</button>
          <button type="button" data-value=".">.</button>
          <button type="button" data-action="equal" style="grid-column: span 2;">=</button>
        </div>
      </div>
    </section>
  </aside>

  <script>
    const CREDIT_CARD_STORAGE_KEY = "money-app-credit-cards-v1";
    const LAST_LOCAL_DATA_UPDATE_KEY = "money-app-last-local-data-update-at";
    const DEFAULT_CREDIT_CARDS = [
      { id: "cc-1", name: "主卡", dueDay: 15 },
      { id: "cc-2", name: "副卡", dueDay: 25 }
    ];

    const cardNameInput = document.getElementById("cardName");
    const dueDayInput = document.getElementById("dueDay");
    const addBtn = document.getElementById("addBtn");
    const cardList = document.getElementById("cardList");

    let creditCards = [];
    let editingCardId = null;

    function normalizeCreditCards(input) {
      const seed = Array.isArray(input) && input.length ? input : DEFAULT_CREDIT_CARDS;
      const normalized = seed.map((card, index) => {
        if (!card || typeof card.name !== "string") return null;
        const name = card.name.trim();
        if (!name) return null;
        const id = String(card.id || `cc-${Date.now()}-${index}`).trim();
        const dueDay = Math.min(28, Math.max(1, Number(card.dueDay) || 15));
        return { id, name, dueDay };
      }).filter(Boolean);
      return normalized.length ? normalized : DEFAULT_CREDIT_CARDS.slice();
    }

    function loadCreditCards() {
      try {
        const raw = localStorage.getItem(CREDIT_CARD_STORAGE_KEY);
        creditCards = normalizeCreditCards(raw ? JSON.parse(raw) : null);
      } catch {
        creditCards = normalizeCreditCards(null);
      }
      if (!localStorage.getItem(CREDIT_CARD_STORAGE_KEY)) {
        localStorage.setItem(CREDIT_CARD_STORAGE_KEY, JSON.stringify(creditCards));
      }
    }

    function saveCreditCards() {
      localStorage.setItem(LAST_LOCAL_DATA_UPDATE_KEY, new Date().toISOString());
      localStorage.setItem(CREDIT_CARD_STORAGE_KEY, JSON.stringify(creditCards));
    }

    function escapeHtml(text) {
      return String(text || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function renderCards() {
      cardList.innerHTML = "";
      creditCards.forEach((card) => {
        const row = document.createElement("div");
        row.className = "row";
        row.dataset.id = card.id;
        const isEditing = editingCardId === card.id;
        if (isEditing) {
          row.innerHTML = `
            <div class="row-edit-form">
              <input type="text" data-edit-name value="${escapeHtml(card.name)}" placeholder="信用卡名稱" />
              <input type="number" data-edit-dueday min="1" max="28" value="${card.dueDay}" placeholder="繳款日" />
              <button type="button" class="tiny-btn btn-primary" data-action="save" data-id="${card.id}">儲存</button>
              <button type="button" class="tiny-btn" data-action="cancel" data-id="${card.id}">取消</button>
            </div>
          `;
          row.querySelector('[data-edit-name]').focus();
        } else {
          row.innerHTML = `
            <div>
              <div>${escapeHtml(card.name)}</div>
              <div class="meta">每月 ${card.dueDay} 日繳款</div>
            </div>
            <div class="row-actions">
              <button type="button" class="tiny-btn" data-action="edit" data-id="${card.id}">編輯</button>
              <button type="button" class="tiny-btn" data-action="delete" data-id="${card.id}">刪除</button>
            </div>
          `;
        }
        cardList.appendChild(row);
      });
    }

    function beginEditCard(id) {
      editingCardId = id;
      renderCards();
    }

    function saveEditCard(id) {
      const row = cardList.querySelector(`.row[data-id="${id}"]`);
      if (!row) return;
      const nameInput = row.querySelector("[data-edit-name]");
      const dueDayInput = row.querySelector("[data-edit-dueday]");
      if (!nameInput || !dueDayInput) return;
      const name = String(nameInput.value || "").trim();
      const dueDay = Math.min(28, Math.max(1, Number(dueDayInput.value) || 15));
      if (!name) {
        alert("請輸入信用卡名稱。");
        return;
      }
      const otherHasName = creditCards.some((c) => c.id !== id && c.name === name);
      if (otherHasName) {
        alert("已存在同名稱的信用卡。");
        return;
      }
      const card = creditCards.find((c) => c.id === id);
      if (card) {
        card.name = name;
        card.dueDay = dueDay;
      }
      editingCardId = null;
      saveCreditCards();
      renderCards();
    }

    function cancelEditCard() {
      editingCardId = null;
      renderCards();
    }

    function addCard() {
      const name = String(cardNameInput.value || "").trim();
      const dueDay = Math.min(28, Math.max(1, Number(dueDayInput.value) || 15));
      if (!name) {
        alert("請輸入信用卡名稱。");
        return;
      }
      if (creditCards.some((c) => c.name === name)) {
        alert("已存在同名稱的信用卡。");
        return;
      }
      const newCard = {
        id: `cc-${Date.now()}`,
        name,
        dueDay
      };
      creditCards.push(newCard);
      saveCreditCards();
      cardNameInput.value = "";
      dueDayInput.value = "15";
      editingCardId = newCard.id;
      renderCards();
    }

    cardList.addEventListener("click", (event) => {
      const btn = event.target.closest("button");
      if (!btn) return;
      const action = btn.dataset.action;
      const id = btn.dataset.id;
      if (!id) return;
      if (action === "edit") {
        beginEditCard(id);
        return;
      }
      if (action === "save") {
        saveEditCard(id);
        return;
      }
      if (action === "cancel") {
        cancelEditCard();
        return;
      }
      if (action === "delete") {
        if (!confirm("確定要刪除此信用卡嗎？相關消費紀錄的信用卡欄位將被清空。")) return;
        if (editingCardId === id) editingCardId = null;
        creditCards = creditCards.filter((c) => c.id !== id);
        saveCreditCards();
        renderCards();
        alert("已刪除。");
      }
    });

    addBtn.addEventListener("click", addCard);
    loadCreditCards();
    renderCards();

    (function initRobot() {
      const robotBtn = document.getElementById("robotBtn");
      const robotPanel = document.getElementById("robotPanel");
      const calcScreen = document.getElementById("calcScreen");
      const calcGrid = document.getElementById("calcGrid");
      let calcExpression = "0";
      function safeEval(expr) {
        const n = (expr || "").replace(/%/g, "/100");
        if (!/^[\d+\-*/().\s]+$/.test(n)) return null;
        try {
          const r = Function('"use strict"; return (' + n + ');')();
          return Number.isFinite(r) ? r : null;
        } catch { return null; }
      }
      if (robotBtn && robotPanel) {
        robotBtn.addEventListener("click", () => {
          robotPanel.classList.toggle("show");
          robotPanel.setAttribute("aria-hidden", robotPanel.classList.contains("show") ? "false" : "true");
        });
      }
      if (calcGrid && calcScreen) {
        calcGrid.addEventListener("click", (e) => {
          const btn = e.target;
          if (!(btn instanceof HTMLButtonElement)) return;
          const { value, action } = btn.dataset;
          if (action === "clear") calcExpression = "0";
          else if (action === "delete") calcExpression = calcExpression.length > 1 ? calcExpression.slice(0, -1) : "0";
          else if (action === "equal") { const r = safeEval(calcExpression); calcExpression = r === null ? "錯誤" : String(r); }
          else if (value) calcExpression = (calcExpression === "0" || calcExpression === "錯誤") ? value : calcExpression + value;
          calcScreen.value = calcExpression;
        });
      }
    })();
  </script>
</body>
</html>
